<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blitz Network</title>
  <meta name="description" content="Blitz Network - Blitz SMP and Blitz FFA." />
  <style>
    :root{
      --bg:#04111a;
      --bg-2:#06202f;
      --panel:rgba(8, 26, 38, 0.78);
      --panel-2:rgba(10, 34, 50, 0.92);
      --line:rgba(130, 225, 255, 0.14);
      --line-strong:rgba(130, 225, 255, 0.28);
      --text:#eefcff;
      --muted:#9fc9d8;
      --aqua:#63f3ff;
      --cyan:#2ecbff;
      --blue:#1a8dff;
      --white:rgba(255,255,255,0.9);
      --shadow:0 24px 80px rgba(0,0,0,.35);
      --radius:28px;
      --max:1240px;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 20% 0%, rgba(79, 240, 255, .18), transparent 24%),
        radial-gradient(circle at 80% 10%, rgba(44, 150, 255, .16), transparent 22%),
        radial-gradient(circle at 50% 100%, rgba(24, 81, 145, .35), transparent 40%),
        linear-gradient(180deg, #031019 0%, #04141f 35%, #051a28 100%);
      overflow-x:hidden;
    }

    a{color:inherit;text-decoration:none}
    button{font:inherit}
    .site{position:relative; z-index:2}
    .container{width:min(var(--max), calc(100% - 28px)); margin:0 auto}

    .bg{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:0;
      overflow:hidden;
    }

    .deep-grid{
      position:absolute;
      inset:-10% -10% auto -10%;
      height:120vh;
      background:
        linear-gradient(to right, rgba(142, 236, 255, .07) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(142, 236, 255, .07) 1px, transparent 1px);
      background-size:64px 64px;
      transform:perspective(1300px) rotateX(78deg) translateY(-6%);
      transform-origin:top center;
      mask-image:linear-gradient(to bottom, rgba(255,255,255,.95), rgba(255,255,255,.25) 55%, transparent 92%);
      -webkit-mask-image:linear-gradient(to bottom, rgba(255,255,255,.95), rgba(255,255,255,.25) 55%, transparent 92%);
      opacity:.9;
    }

    .caustics{
      position:absolute;
      inset:-20%;
      background:
        radial-gradient(circle at 10% 30%, rgba(144, 249, 255, .08), transparent 18%),
        radial-gradient(circle at 35% 60%, rgba(82, 204, 255, .10), transparent 16%),
        radial-gradient(circle at 80% 40%, rgba(86, 173, 255, .08), transparent 18%),
        radial-gradient(circle at 65% 15%, rgba(200, 255, 255, .05), transparent 14%);
      filter:blur(35px);
      animation:drift 18s ease-in-out infinite alternate;
    }

    @keyframes drift{
      0%{transform:translate3d(-2%, -1%, 0) scale(1)}
      100%{transform:translate3d(2%, 2%, 0) scale(1.08)}
    }

    .bubbles{
      position:absolute;
      inset:0;
      overflow:hidden;
    }

    .bubble{
      position:absolute;
      bottom:-80px;
      width:14px;
      height:14px;
      border-radius:50%;
      background:radial-gradient(circle at 35% 35%, rgba(255,255,255,.92), rgba(112,236,255,.3) 55%, rgba(112,236,255,0) 70%);
      border:1px solid rgba(190, 248, 255, .25);
      box-shadow:0 0 18px rgba(98, 238, 255, .12);
      animation:rise linear infinite;
    }

    @keyframes rise{
      0%{transform:translateY(0) translateX(0) scale(.85); opacity:0}
      10%{opacity:.7}
      85%{opacity:.55}
      100%{transform:translateY(-120vh) translateX(var(--drift, 20px)) scale(1.15); opacity:0}
    }

    .fish{
      position:absolute;
      width:150px;
      height:70px;
      opacity:.18;
      filter:drop-shadow(0 0 18px rgba(79, 240, 255, .14));
      animation-timing-function:linear;
      animation-iteration-count:infinite;
    }

    .fish svg{width:100%; height:100%}

    .fish.one{top:14%; left:-180px; animation:swim-right 28s infinite}
    .fish.two{top:56%; left:-220px; animation:swim-right 34s infinite; animation-delay:-10s; transform:scale(.9)}
    .fish.three{top:32%; right:-180px; animation:swim-left 30s infinite; animation-delay:-6s; transform:scale(.75)}
    .fish.four{top:78%; right:-220px; animation:swim-left 38s infinite; animation-delay:-18s; transform:scale(1.05)}

    @keyframes swim-right{
      0%{transform:translateX(0) translateY(0) scale(.95)}
      50%{transform:translateX(calc(55vw + 120px)) translateY(24px) scale(1)}
      100%{transform:translateX(calc(110vw + 260px)) translateY(-8px) scale(.92)}
    }

    @keyframes swim-left{
      0%{transform:translateX(0) scaleX(-1) scale(.9)}
      50%{transform:translateX(calc(-55vw - 120px)) translateY(-28px) scaleX(-1) scale(.98)}
      100%{transform:translateX(calc(-110vw - 260px)) translateY(10px) scaleX(-1) scale(.9)}
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:40;
      backdrop-filter:blur(18px);
      background:rgba(4, 15, 23, .56);
      border-bottom:1px solid rgba(147, 240, 255, .08);
    }

    .nav{
      min-height:78px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      min-width:0;
    }

    .brand-mark{
      width:44px;
      height:44px;
      border-radius:14px;
      position:relative;
      overflow:hidden;
      border:1px solid rgba(136, 236, 255, .22);
      background:
        radial-gradient(circle at 35% 30%, rgba(255,255,255,.24), transparent 34%),
        linear-gradient(145deg, rgba(92, 243, 255, .22), rgba(22, 109, 255, .08));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.08), 0 10px 35px rgba(29, 176, 255, .16);
    }

    .brand-mark::before,
    .brand-mark::after{
      content:"";
      position:absolute;
      border-radius:999px;
      background:linear-gradient(90deg, var(--aqua), var(--cyan), var(--blue));
    }

    .brand-mark::before{
      left:9px; right:10px; top:13px; height:3px;
    }

    .brand-mark::after{
      left:9px; right:16px; top:23px; height:3px;
    }

    .brand-text{
      display:flex;
      flex-direction:column;
      line-height:1;
    }

    .brand-text strong{
      font-size:15px;
      letter-spacing:.2em;
      text-transform:uppercase;
      color:var(--white);
    }

    .brand-text span{
      margin-top:6px;
      font-size:11px;
      letter-spacing:.22em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .nav-links{
      display:flex;
      align-items:center;
      gap:26px;
      color:#d6f7ff;
      font-size:14px;
    }

    .nav-links a{
      position:relative;
      opacity:.92;
    }

    .nav-links a::after{
      content:"";
      position:absolute;
      left:0;
      bottom:-8px;
      width:0;
      height:1px;
      background:linear-gradient(90deg, var(--aqua), var(--cyan), var(--blue));
      transition:width .22s ease;
    }

    .nav-links a:hover::after{width:100%}

    .nav-cta{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:48px;
      padding:0 18px;
      border-radius:999px;
      font-weight:700;
      color:#041019;
      background:linear-gradient(135deg, var(--aqua), var(--cyan), var(--blue));
      box-shadow:0 12px 34px rgba(46, 203, 255, .22);
    }

    .hero{
      padding:74px 0 30px;
    }

    .hero-shell{
      position:relative;
      overflow:hidden;
      border-radius:34px;
      min-height:760px;
      border:1px solid rgba(146, 238, 255, .12);
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
        rgba(7, 22, 32, .72);
      box-shadow:var(--shadow);
      isolation:isolate;
    }

    .hero-shell::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 12% 18%, rgba(91, 241, 255, .15), transparent 18%),
        radial-gradient(circle at 86% 14%, rgba(37, 150, 255, .13), transparent 16%),
        linear-gradient(135deg, transparent 0 58%, rgba(255,255,255,.03) 66%, transparent 74%);
      pointer-events:none;
    }

    .hero-waterline{
      position:absolute;
      left:26px;
      right:26px;
      top:88px;
      height:1px;
      background:linear-gradient(90deg, transparent, rgba(126, 240, 255, .16), rgba(72, 198, 255, .9), rgba(126, 240, 255, .16), transparent);
      box-shadow:0 0 18px rgba(72, 198, 255, .18);
    }

    .hero-content{
      position:relative;
      display:grid;
      grid-template-columns:1.12fr .88fr;
      gap:20px;
      min-height:760px;
      padding:46px;
    }

    .hero-copy{
      align-self:start;
      padding-top:54px;
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:10px;
      min-height:38px;
      padding:0 14px;
      border-radius:999px;
      border:1px solid rgba(136, 236, 255, .18);
      background:rgba(90, 243, 255, .06);
      color:#dfffff;
      font-size:11px;
      letter-spacing:.18em;
      text-transform:uppercase;
    }

    .eyebrow::before{
      content:"";
      width:8px;
      height:8px;
      border-radius:999px;
      background:linear-gradient(180deg, var(--aqua), var(--blue));
      box-shadow:0 0 16px rgba(84, 236, 255, .8);
    }

    h1{
      margin:18px 0 0;
      max-width:760px;
      font-size:clamp(54px, 8vw, 110px);
      line-height:.9;
      letter-spacing:-.055em;
      font-weight:900;
    }

    .gradient{
      background:linear-gradient(135deg, #ffffff 0%, #abfcff 38%, #50e1ff 70%, #1e8fff 100%);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }

    .hero-sub{
      margin-top:22px;
      max-width:620px;
      color:var(--muted);
      font-size:18px;
      line-height:1.7;
    }

    .hero-actions{
      margin-top:30px;
      display:flex;
      flex-wrap:wrap;
      gap:14px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:54px;
      padding:0 20px;
      border-radius:18px;
      font-weight:700;
      border:1px solid transparent;
      transition:transform .18s ease, background .18s ease, border-color .18s ease;
    }

    .btn:hover{transform:translateY(-2px)}

    .btn-primary{
      color:#031018;
      background:linear-gradient(135deg, var(--aqua), var(--cyan), var(--blue));
      box-shadow:0 14px 36px rgba(44, 188, 255, .24);
    }

    .btn-secondary{
      background:rgba(255,255,255,.03);
      border-color:rgba(131, 232, 255, .12);
      color:#e9fbff;
    }

    .hero-side{
      display:grid;
      gap:18px;
      align-content:start;
      padding-top:8px;
    }

    .panel{
      position:relative;
      overflow:hidden;
      border-radius:28px;
      border:1px solid rgba(146, 238, 255, .12);
      background:
        linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.015)),
        rgba(9, 27, 39, .84);
      box-shadow:var(--shadow);
    }

    .status-card{
      min-height:220px;
      padding:24px;
    }

    .status-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:16px;
    }

    .status-label{
      color:#d3f7ff;
      font-size:12px;
      letter-spacing:.18em;
      text-transform:uppercase;
    }

    .status-live{
      display:inline-flex;
      align-items:center;
      gap:8px;
      color:#eafcff;
      font-size:13px;
      font-weight:700;
    }

    .status-live::before{
      content:"";
      width:8px;
      height:8px;
      border-radius:999px;
      background:linear-gradient(180deg, var(--aqua), var(--blue));
      box-shadow:0 0 12px rgba(93, 239, 255, .75);
    }

    .server-ip{
      margin-top:30px;
      max-width:260px;
      font-size:36px;
      line-height:.95;
      letter-spacing:-.05em;
      font-weight:900;
      word-break:break-word;
    }

    .server-ip small{
      display:block;
      margin-top:12px;
      color:var(--muted);
      font-size:14px;
      font-weight:500;
      line-height:1.6;
    }

    .panel-grid{
      display:grid;
      grid-template-columns:repeat(2, 1fr);
      gap:18px;
    }

    .metric{
      min-height:150px;
      padding:22px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }

    .metric span{
      color:#d1f0f7;
      font-size:11px;
      letter-spacing:.18em;
      text-transform:uppercase;
    }

    .metric strong{
      font-size:42px;
      line-height:1;
      letter-spacing:-.05em;
    }

    .section{
      padding:20px 0 0;
    }

    .section-head{
      display:flex;
      align-items:end;
      justify-content:space-between;
      gap:20px;
      margin-bottom:20px;
    }

    .section-head small{
      display:block;
      color:#9fe8fb;
      font-size:11px;
      letter-spacing:.22em;
      text-transform:uppercase;
    }

    .section-head h2{
      margin:10px 0 0;
      font-size:clamp(34px, 4vw, 58px);
      line-height:.98;
      letter-spacing:-.05em;
    }

    .section-head p{
      max-width:520px;
      margin:0;
      color:var(--muted);
      line-height:1.7;
    }

    .rule{
      height:1px;
      margin:0 0 24px;
      background:linear-gradient(90deg, transparent 0%, rgba(110, 236, 255, .2) 16%, rgba(42, 196, 255, .95) 50%, rgba(110, 236, 255, .2) 84%, transparent 100%);
      box-shadow:0 0 18px rgba(42, 196, 255, .18);
    }

    .modes{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
    }

    .mode-card{
      position:relative;
      min-height:400px;
      padding:28px;
      overflow:hidden;
      border-radius:30px;
      border:1px solid rgba(146, 238, 255, .12);
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.012)),
        linear-gradient(135deg, rgba(92, 241, 255, .055), transparent 46%),
        rgba(9, 27, 39, .88);
      box-shadow:var(--shadow);
    }

    .mode-card::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 100% 0%, rgba(78, 209, 255, .14), transparent 22%),
        linear-gradient(140deg, transparent 60%, rgba(255,255,255,.03) 100%);
      pointer-events:none;
    }

    .mode-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
    }

    .mode-tag{
      display:inline-flex;
      align-items:center;
      gap:10px;
      min-height:34px;
      padding:0 12px;
      border-radius:999px;
      background:rgba(255,255,255,.035);
      border:1px solid rgba(131, 232, 255, .12);
      color:#dffaff;
      font-size:11px;
      letter-spacing:.18em;
      text-transform:uppercase;
    }

    .mode-tag::before{
      content:"";
      width:8px;
      height:8px;
      border-radius:999px;
      background:linear-gradient(180deg, var(--aqua), var(--blue));
    }

    .mode-fish{
      width:88px;
      height:88px;
      opacity:.24;
    }

    .mode-fish svg{width:100%; height:100%}

    .mode-card h3{
      margin:18px 0 10px;
      font-size:42px;
      line-height:.94;
      letter-spacing:-.05em;
    }

    .mode-card p{
      margin:0;
      color:var(--muted);
      line-height:1.7;
      max-width:480px;
    }

    .mode-stats{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:28px;
    }

    .mode-stat{
      padding:16px;
      border-radius:18px;
      border:1px solid rgba(131, 232, 255, .1);
      background:rgba(255,255,255,.022);
    }

    .mode-stat strong{
      display:block;
      font-size:24px;
      letter-spacing:-.04em;
    }

    .mode-stat span{
      display:block;
      margin-top:8px;
      color:#c1e8f0;
      font-size:12px;
      letter-spacing:.14em;
      text-transform:uppercase;
      line-height:1.4;
    }

    .store-grid{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:20px;
    }

    .product{
      position:relative;
      min-height:340px;
      padding:26px;
      display:flex;
      flex-direction:column;
      overflow:hidden;
      border-radius:28px;
      border:1px solid rgba(146, 238, 255, .12);
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.012)),
        rgba(9, 27, 39, .9);
      box-shadow:var(--shadow);
    }

    .product::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 100% 0%, rgba(82, 205, 255, .16), transparent 24%),
        linear-gradient(145deg, transparent 62%, rgba(255,255,255,.03) 100%);
      pointer-events:none;
    }

    .product-tag{
      display:inline-flex;
      width:max-content;
      min-height:32px;
      align-items:center;
      padding:0 11px;
      border-radius:999px;
      background:rgba(97, 243, 255, .08);
      border:1px solid rgba(136, 236, 255, .18);
      color:#deffff;
      font-size:11px;
      letter-spacing:.16em;
      text-transform:uppercase;
    }

    .product h4{
      margin:18px 0 8px;
      font-size:34px;
      line-height:.95;
      letter-spacing:-.05em;
    }

    .product p{
      margin:0;
      color:var(--muted);
      line-height:1.7;
    }

    .price{
      margin:24px 0 18px;
      display:flex;
      align-items:flex-end;
      gap:10px;
    }

    .price strong{
      font-size:46px;
      line-height:1;
      letter-spacing:-.06em;
    }

    .price span{
      padding-bottom:6px;
      color:#c2edf5;
      font-size:14px;
    }

    .product ul{
      list-style:none;
      padding:0;
      margin:0;
      display:grid;
      gap:10px;
      color:#e8fdff;
      font-size:14px;
    }

    .product ul li{
      position:relative;
      padding-left:18px;
    }

    .product ul li::before{
      content:"";
      position:absolute;
      left:0;
      top:9px;
      width:8px;
      height:8px;
      border-radius:999px;
      background:linear-gradient(180deg, var(--aqua), var(--blue));
    }

    .product-actions{
      margin-top:auto;
      padding-top:22px;
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .buy{
      flex:1;
      min-width:130px;
      color:#041019;
      background:linear-gradient(135deg, var(--aqua), var(--cyan), var(--blue));
      box-shadow:0 14px 32px rgba(42, 196, 255, .18);
    }

    .ghost{
      flex:1;
      min-width:130px;
      color:#ebfeff;
      background:rgba(255,255,255,.03);
      border:1px solid rgba(131, 232, 255, .12);
    }

    .join-strip{
      margin-top:28px;
      padding:28px;
      border-radius:30px;
      border:1px solid rgba(146, 238, 255, .12);
      background:
        linear-gradient(135deg, rgba(92, 241, 255, .05), transparent 45%),
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.012)),
        rgba(8, 24, 35, .9);
      box-shadow:var(--shadow);
      display:grid;
      grid-template-columns:1.1fr .9fr;
      gap:20px;
      align-items:center;
    }

    .join-strip h3{
      margin:0;
      font-size:40px;
      line-height:.95;
      letter-spacing:-.05em;
      max-width:700px;
    }

    .join-strip p{
      margin:12px 0 0;
      max-width:620px;
      color:var(--muted);
      line-height:1.7;
    }

    .join-actions{
      display:flex;
      justify-content:flex-end;
      gap:12px;
      flex-wrap:wrap;
    }

    .footer{
      padding:34px 0 56px;
    }

    .footer-box{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
      flex-wrap:wrap;
      border-top:1px solid rgba(131, 232, 255, .08);
      padding-top:22px;
      color:#b2dbe5;
      font-size:14px;
    }

    .footer-links{
      display:flex;
      gap:18px;
      color:#ecfdff;
    }

    .reveal{
      opacity:0;
      transform:translateY(28px);
      transition:opacity .72s ease, transform .72s ease;
    }

    .reveal.show{
      opacity:1;
      transform:none
